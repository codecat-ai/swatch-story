name: Bug report
description: Report a reproducible problem in swatch-story.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the command, local image details, and output.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Python version
      placeholder: "3.11.8"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
